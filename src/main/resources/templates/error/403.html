<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; background-color: #f8d7da; }
        .alert-box { background: white; padding: 40px; border-radius: 8px; display: inline-block; border: 2px solid #dc3545; }
        h1 { color: #dc3545; }
        p { font-size: 18px; color: #333; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #0056b3; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
<div class="alert-box">
    <h1>¡Acceso Restringido!</h1>
    <p>Tu rol de usuario actual no tiene permisos para realizar esta acción.</p>
    <p>Por favor, comunícate con el administrador si crees que esto es un error.</p>
    <a th:href="@{/asignaturas}">Volver a la Lista Segura</a>
</div>
</body>
</html>
