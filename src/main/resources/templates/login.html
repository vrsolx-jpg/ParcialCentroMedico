<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Portal Medico | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-primary { background: #1e3c72; border: none; }
        .btn-primary:hover { background: #2a5298; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Gestion Medica</h2>
                    <p class="text-muted">Inicie sesion para continuar</p>
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de usuario</label>
                        <select id="tipoUsuario" class="form-select" onchange="actualizarCampos()" required>
                            <option value="">Seleccione una opcion</option>
                            <option value="ADMINISTRADOR">Administrador</option>
                            <option value="MEDICO">Medico</option>
                            <option value="PACIENTE">Paciente</option>
                        </select>
                    </div>

                    <div class="mb-3 d-none" id="pacienteContainer">
                        <label class="form-label fw-bold">Paciente</label>
                        <select id="pacienteSelect" class="form-select" onchange="actualizarCampos()">
                            <option value="">Seleccione un paciente</option>
                            <option value="PAC-101">Diego Perez</option>
                            <option value="PAC-102">Marta Lopez</option>
                            <option value="PAC-103">Juan Castro</option>
                        </select>
                    </div>

                    <input type="hidden" id="username" name="username" required>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contrasena</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Ingresar al Sistema</button>
                </form>

                <div th:if="${param.error}" class="alert alert-danger mt-3 text-center">
                    Credenciales invalidas.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function actualizarCampos() {
        const tipoUsuario = document.getElementById('tipoUsuario').value;
        const pacienteContainer = document.getElementById('pacienteContainer');
        const pacienteSelect = document.getElementById('pacienteSelect');
        const username = document.getElementById('username');

        if (tipoUsuario === 'ADMINISTRADOR') {
            pacienteContainer.classList.add('d-none');
            pacienteSelect.value = '';
            username.value = 'ADMIN-999';
            return;
        }

        if (tipoUsuario === 'MEDICO') {
            pacienteContainer.classList.add('d-none');
            pacienteSelect.value = '';
            username.value = 'MED-000';
            return;
        }

        if (tipoUsuario === 'PACIENTE') {
            pacienteContainer.classList.remove('d-none');
            username.value = pacienteSelect.value;
            return;
        }

        pacienteContainer.classList.add('d-none');
        pacienteSelect.value = '';
        username.value = '';
    }
</script>
</body>
</html>
