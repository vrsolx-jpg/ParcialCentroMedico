<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Portal Médico | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-primary { background: #1e3c72; border: none; }
        .btn-primary:hover { background: #2a5298; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Gestión Médica</h2>
                    <p class="text-muted">Inicie sesión para continuar</p>
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Código de empleado/paciente" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Ingresar al Sistema</button>
                </form>
                <div th:if="${param.error}" class="alert alert-danger mt-3 text-center">
                    Credenciales inválidas.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
