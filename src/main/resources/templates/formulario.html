<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3 th:text="${consulta.id == null ? 'Nueva Consulta' : 'Actualizar Consulta'}">Título</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/consultas/guardar}" th:object="${consulta}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <!-- Nombre del Paciente: Bloqueado para el PACIENTE -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Paciente</label>
                            <input type="text" th:field="*{nombrePaciente}" class="form-control"
                                   maxlength="40" required
                                   th:readonly="${#authorization.expression('hasRole(''PACIENTE'')')}">
                        </div>

                        <!-- Motivo: Bloqueado para el PACIENTE -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo de la Consulta</label>
                            <textarea th:field="*{motivo}" class="form-control" rows="2"
                                      maxlength="100" required
                                      th:readonly="${#authorization.expression('hasRole(''PACIENTE'')')}"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Consultorio #</label>
                                <input type="number" th:field="*{numeroConsultorio}" class="form-control"
                                       required
                                       th:readonly="${#authorization.expression('hasRole(''PACIENTE'')')}">
                            </div>

                            <!-- HORARIOS: SIEMPRE HABILITADOS (Para Admin y Paciente) -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold text-success">Hora Inicio</label>
                                <input type="time" th:field="*{horaInicio}" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold text-success">Hora Fin</label>
                                <input type="time" th:field="*{horaFin}" class="form-control" required>
                            </div>
                        </div>

                        <!-- Médico: Bloqueado para el PACIENTE -->
                        <div class="mb-4" th:if="${!#authorization.expression('hasRole(''PACIENTE'')')}">
                            <label class="form-label fw-bold">Médico Asignado</label>
                            <select th:field="*{medico}" class="form-select" required>
                                <option value="">-- Seleccione el Médico --</option>
                                <option th:each="m : ${listaMedicos}" th:value="${m.id}" th:text="${m.nombre}"></option>
                            </select>
                        </div>

                        <!-- Si es paciente, mostramos el nombre del médico en texto plano para que sepa con quién es -->
                        <div class="mb-4" sec:authorize="hasRole('PACIENTE')">
                            <label class="form-label fw-bold text-muted">Médico Asignado (No editable)</label>
                            <input type="text" th:value="${consulta.medico.nombre}" class="form-control" readonly>
                            <input type="hidden" th:field="*{medico}"> <!-- Importante para no perder la relación al guardar -->
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <span th:text="${#authorization.expression('hasRole(''PACIENTE'')') ? 'Actualizar Horario' : 'Guardar Cambios'}">Botón</span>
                            </button>
                            <a th:href="@{/consultas}" class="btn btn-secondary">Regresar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
