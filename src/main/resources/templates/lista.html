<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Consultas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">Centro Médico San Rafael</a>
    <form th:action="@{/logout}" method="post">
      <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="card shadow">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Listado de Consultas Médicas</h4>
      <!-- Solo el ADMINISTRADOR puede crear -->
      <a sec:authorize="hasRole('ADMINISTRADOR')" th:href="@{/consultas/nuevo}" class="btn btn-success">Nueva Consulta</a>
    </div>
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-dark">
        <tr>
          <th>Paciente</th>
          <th>Motivo</th>
          <th>Consultorio</th>
          <th>Horario</th>
          <th>Médico</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${listaConsultas}">
          <td th:text="${c.nombrePaciente}"></td>
          <td th:text="${c.motivo}"></td>
          <td th:text="${c.numeroConsultorio}"></td>
          <td th:text="${c.horaInicio + ' - ' + c.horaFin}"></td>
          <td th:text="${c.medico.nombre}"></td>
          <td>
            <!-- ADMIN edita/borra, PACIENTE solo actualiza horario -->
            <a sec:authorize="hasAnyRole('ADMINISTRADOR', 'PACIENTE')"
               th:href="@{/consultas/editar/{id}(id=${c.id})}"
               class="btn btn-warning btn-sm">Editar</a>

            <a sec:authorize="hasRole('ADMINISTRADOR')"
               th:href="@{/consultas/eliminar/{id}(id=${c.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Eliminar consulta?')">Borrar</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
